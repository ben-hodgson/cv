name: Compile CV to PDF

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Optional: Run automatically every Sunday at midnight

jobs:
  latex-to-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install texlive packages (for moderncv/symbols)
        # This installs a full TeX Live distribution with common fonts and packages
        uses: AugusrDusT/texlive-action@v2
        with:
          install_opts: |
            lmodern
            amsmath
            geometry
            xcolor
            iftex

      - name: Compile LaTeX to PDF
        run: |
          # This runs pdflatex in "synctex" mode repeatedly until it finishes or fails
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v3
        with:
          name: cv-pdf
          path: main.pdf
